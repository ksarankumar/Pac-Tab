<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PacTab</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="22" height="22" fill="none">
          <defs>
            <linearGradient id="zg" x1="5" y1="5" x2="27" y2="27" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5eead4"/><stop offset="1" stop-color="#14b8a6"/>
            </linearGradient>
          </defs>
          <path d="M16 16 L25.97 11.35 A11 11 0 1 0 25.97 20.65 Z" fill="url(#zg)"/>
          <circle cx="15" cy="9.5" r="1.5" fill="#0f1720"/>
        </svg>
      </span>
      <div>
        <h1>PacTab</h1>
        <p class="tagline">Munch the clutter, save the RAM</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="toggle-enabled" class="icon-btn" title="Enable / disable auto-limit" aria-label="Toggle auto-limit">
        <span class="dot" id="status-dot"></span>
      </button>
      <button id="open-options" class="icon-btn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="usage">
    <div class="usage-top">
      <span class="usage-label">Tab usage</span>
      <span class="usage-count"><b id="tab-count">0</b> / <span id="tab-limit">0</span></span>
    </div>
    <div class="usage-bar"><div class="usage-fill" id="usage-fill"></div></div>
    <p class="usage-hint" id="usage-hint"></p>
  </section>

  <section class="stats">
    <div class="stat">
      <span class="stat-num" id="stat-windows">0</span>
      <span class="stat-label">Windows</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-dupes">0</span>
      <span class="stat-label">Duplicates</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-domains">0</span>
      <span class="stat-label">Domains</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-autoclosed">0</span>
      <span class="stat-label">Auto-closed</span>
    </div>
  </section>

  <section class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="search" type="text" placeholder="Search tabs…" autocomplete="off" />
    </div>
    <button id="btn-dupes" class="chip" title="Close duplicate tabs">Dedupe</button>
    <button id="btn-enforce" class="chip" title="Apply tab limit now">Tidy</button>
  </section>

  <main id="tab-list" class="tab-list" aria-live="polite"></main>

  <footer class="app-footer">
    <span id="footer-note">Click a tab to switch • hover to close</span>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
